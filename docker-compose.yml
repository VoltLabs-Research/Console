#   docker network create voltcloud-net
#   docker compose up -d --build

name: console-voltcloud

networks:
    internal:
    voltcloud-net:
        external: true

volumes:
    mongo-data:

services:
    mongo:
        image: mongo:7
        restart: unless-stopped
        volumes:
            - mongo-data:/data/db
        networks:
            - internal

    console:
        build:
            context: ./server
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file:
            - ./server/.env
        depends_on:
            - mongo
        ports:
            - '7080:8081'
        networks:
            - internal
            - voltcloud-net

    console-client:
        build:
            context: ./client
            dockerfile: Dockerfile
        restart: unless-stopped
        depends_on:
            - console
        ports:
            - '7085:80'
        networks:
            - internal
